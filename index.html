<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedtime Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0C0C10;
  --bg-1:      #131318;
  --bg-2:      #1A1A22;
  --bg-3:      #22222E;
  --border:    rgba(255,255,255,0.07);
  --border-md: rgba(255,255,255,0.12);
  --text:      #EEEAE2;
  --text-2:    #8C8880;
  --text-3:    #4A4844;
  --accent:    #C9A84C;
  --accent-lo: rgba(201,168,76,0.12);
  --accent-md: rgba(201,168,76,0.25);
  --blue:      #4A9EE8;
  --green:     #4ACA7A;
  --red:       #E05A52;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--text); overflow-x: hidden;
}
body { padding: 1.8rem 2rem 3rem; overflow-y: auto; }

.header { margin-bottom: 1.8rem; }
.header h1 {
  font-family: 'Lora', serif; font-size: 1.5rem; font-weight: 600;
  color: var(--text); margin-bottom: 0.25rem;
}
.header p { font-size: 0.8rem; color: var(--text-2); }

.panel {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.2rem 1.4rem; margin-bottom: 1rem;
}
.panel-label {
  font-size: 0.62rem; font-weight: 600; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 0.9rem;
}

/* Language buttons */
.lang-row { display: flex; gap: 0.6rem; }
.lang-btn {
  flex: 1; padding: 0.6rem 0.5rem;
  background: var(--bg-2); border: 1px solid var(--border-md);
  border-radius: 6px; color: var(--text-2);
  font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.lang-btn:hover { background: var(--bg-3); color: var(--text); }
.lang-btn.active {
  background: var(--accent-lo); border-color: rgba(201,168,76,0.35);
  color: var(--accent);
}

/* Inputs row */
.inputs-row { display: flex; gap: 1rem; flex-wrap: wrap; }
.input-group { flex: 1; min-width: 100px; }
.input-group.wide { flex: 2; }
.input-group label {
  display: block; font-size: 0.62rem; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 0.5rem;
}
input[type="number"], input[type="text"] {
  width: 100%; padding: 0.55rem 0.9rem;
  background: var(--bg-2); border: 1px solid var(--border-md);
  border-radius: 6px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 0.85rem;
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--text-3); }

.tag-add-row { display: flex; gap: 0.5rem; margin-bottom: 0.8rem; }
.tag-add-row input { flex: 1; }
.add-btn {
  padding: 0.55rem 0.9rem;
  background: var(--accent-lo); border: 1px solid rgba(201,168,76,0.3);
  border-radius: 6px; color: var(--accent); font-size: 1rem;
  cursor: pointer; transition: background 0.18s; flex-shrink: 0;
}
.add-btn:hover { background: var(--accent-md); }

.tags-wrap { display: flex; flex-wrap: wrap; gap: 0.45rem; min-height: 28px; }
.tag {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 9px 3px 10px; border-radius: 20px;
  font-size: 0.78rem; font-weight: 500;
  cursor: pointer; transition: all 0.18s;
  border: 1px solid; user-select: none;
}
.tag.inactive { background: var(--bg-2); border-color: var(--border-md); color: var(--text-3); }
.tag.active { background: rgba(74,158,232,0.12); border-color: rgba(74,158,232,0.35); color: var(--blue); }
.tag .x { font-size: 0.68rem; opacity: 0.45; transition: opacity 0.15s; margin-left: 1px; }
.tag:hover .x { opacity: 0.9; }

.generate-btn {
  width: 100%; padding: 0.85rem;
  background: var(--accent); border: none; border-radius: 8px;
  color: #0C0C10; font-family: 'Inter', sans-serif;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.generate-btn:hover { background: #DDB85A; transform: translateY(-1px); }
.generate-btn:active { transform: translateY(0); }
.generate-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

/* Story output */
.story-out {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: 10px; padding: 1.5rem 1.6rem; margin-top: 1rem;
  display: none;
}
.story-out.visible { display: block; }
.story-out-title {
  font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 600;
  color: var(--accent); text-align: center; margin-bottom: 1.2rem;
}
.story-out-body {
  font-family: 'Lora', serif; font-size: 0.97rem;
  line-height: 1.95; color: var(--text-2);
  white-space: pre-wrap;
}
.cursor { display: inline-block; color: var(--accent); animation: blink 0.7s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Audio */
.audio-bar {
  display: flex; align-items: center; gap: 12px;
  margin-top: 1.4rem; padding-top: 1.2rem;
  border-top: 1px solid var(--border);
}
.play-btn {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent-lo); border: 1px solid rgba(201,168,76,0.3);
  color: var(--accent); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s;
}
.play-btn:hover { background: var(--accent-md); }
.play-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.progress-wrap { flex: 1; }
.track {
  width: 100%; height: 3px; background: var(--bg-3);
  border-radius: 2px; margin-bottom: 5px; overflow: hidden;
}
.fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.5s linear; }
.times { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-3); }

.tts-note {
  font-size: 0.72rem; color: var(--text-3);
  margin-top: 0.5rem; text-align: center;
}

.error-msg { color: var(--red); font-size: 0.82rem; text-align: center; padding: 0.4rem; margin-top: 0.5rem; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
input[type=number]::-webkit-inner-spin-button { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>🌙 Bedtime Stories</h1>
  <p>A magical story tailored for your child — text &amp; narration</p>
</div>

<div class="panel">
  <div class="panel-label">Language</div>
  <div class="lang-row">
    <button class="lang-btn active" data-lang="english">🇬🇧 English</button>
    <button class="lang-btn" data-lang="french">🇫🇷 Français</button>
    <button class="lang-btn" data-lang="russian">🇷🇺 Русский</button>
  </div>
</div>

<div class="panel">
  <div class="inputs-row">
    <div class="input-group">
      <label>Age</label>
      <input type="number" id="ageInput" min="1" max="12" value="5" />
    </div>
    <div class="input-group wide">
      <label>Themes</label>
      <div class="tag-add-row">
        <input type="text" id="tagInput" placeholder="pirate, dragon, firefighter…" />
        <button class="add-btn" id="addBtn">＋</button>
      </div>
    </div>
  </div>
  <div class="tags-wrap" id="tagsWrap"></div>
</div>

<button class="generate-btn" id="genBtn">🌙 Generate bedtime story</button>

<div class="story-out" id="storyOut">
  <div class="story-out-title" id="outTitle"></div>
  <div class="story-out-body" id="outBody"></div>
  <div class="audio-bar" id="audioBar" style="display:none">
    <button class="play-btn" id="playBtn">▶</button>
    <div class="progress-wrap">
      <div class="track"><div class="fill" id="fill"></div></div>
      <div class="times"><span id="tElapsed">0:00</span><span id="tDur">--:--</span></div>
    </div>
  </div>
  <div class="tts-note" id="ttsNote"></div>
  <div class="error-msg" id="errMsg"></div>
</div>

<script>
// ── State ──
let lang = 'english';
let tags = [{text:'pirate',active:true},{text:'treasure',active:true},{text:'dragon',active:false}];
let fullText = '';
let apiKey = '';
let isSpeaking = false;
let audioEl = null;
let progressTimer = null;

// ── API key from parent dashboard ──
window.addEventListener('message', e => {
  if (e.data?.type === 'ANTHROPIC_KEY') apiKey = e.data.key;
  if (e.data?.type === 'GEMINI_KEY') {} // ignore gemini
});

// ── Lang ──
document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    lang = b.dataset.lang;
  });
});

// ── Tags ──
function renderTags() {
  const w = document.getElementById('tagsWrap');
  w.innerHTML = '';
  tags.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'tag ' + (t.active ? 'active' : 'inactive');
    el.innerHTML = `<span>${t.text}</span><span class="x" data-i="${i}">✕</span>`;
    el.querySelector('span:first-child').onclick = () => { tags[i].active = !tags[i].active; renderTags(); };
    el.querySelector('.x').onclick = e => { e.stopPropagation(); tags.splice(i,1); renderTags(); };
    w.appendChild(el);
  });
}

function addTag() {
  const v = document.getElementById('tagInput').value.trim().toLowerCase();
  if (!v || tags.find(t => t.text === v)) return;
  tags.push({text:v, active:true});
  renderTags();
  document.getElementById('tagInput').value = '';
  document.getElementById('tagInput').focus();
}

document.getElementById('addBtn').onclick = addTag;
document.getElementById('tagInput').addEventListener('keydown', e => { if(e.key==='Enter') addTag(); });

// ── Helpers ──
function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ── TTS using Google Translate (free, great multilingual voices) ──
const LANG_CODES = { english:'en', french:'fr', russian:'ru' };

function stopAudio() {
  if (audioEl) { audioEl.pause(); audioEl.src = ''; audioEl = null; }
  clearInterval(progressTimer);
  isSpeaking = false;
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('fill').style.width = '0%';
  document.getElementById('tElapsed').textContent = '0:00';
}

function playAudio(text) {
  stopAudio();
  const code = LANG_CODES[lang];
  // Split text into chunks ≤200 chars at sentence boundaries
  const chunks = splitChunks(text, 195);
  playChunks(chunks, 0);
}

function splitChunks(text, maxLen) {
  const sentences = text.match(/[^.!?…\n]+[.!?…\n]*/g) || [text];
  const chunks = [];
  let current = '';
  for (const s of sentences) {
    if ((current + s).length > maxLen && current) {
      chunks.push(current.trim());
      current = s;
    } else {
      current += s;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks;
}

function playChunks(chunks, idx) {
  if (idx >= chunks.length) {
    isSpeaking = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('fill').style.width = '100%';
    clearInterval(progressTimer);
    return;
  }
  const code = LANG_CODES[lang];
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(chunks[idx])}&tl=${code}&client=tw-ob`;
  const audio = new Audio(url);
  audio.crossOrigin = 'anonymous';
  audioEl = audio;

  if (idx === 0) {
    // estimate total duration from word count
    const totalWords = fullText.split(/\s+/).length;
    const estSecs = (totalWords / 130) * 60;
    document.getElementById('tDur').textContent = fmt(estSecs);
    const start = Date.now();
    progressTimer = setInterval(() => {
      const e = (Date.now()-start)/1000;
      document.getElementById('tElapsed').textContent = fmt(e);
      document.getElementById('fill').style.width = Math.min((e/estSecs)*100,100)+'%';
    }, 500);
    isSpeaking = true;
    document.getElementById('playBtn').textContent = '⏸';
  }

  audio.onended = () => playChunks(chunks, idx+1);
  audio.onerror = () => {
    // fallback to browser TTS if Google TTS fails
    document.getElementById('ttsNote').textContent = '⚠ Using browser voice (install better system voices for French/Russian)';
    clearInterval(progressTimer);
    isSpeaking = false;
    document.getElementById('playBtn').textContent = '▶';
    fallbackBrowserTTS(fullText);
  };
  audio.play().catch(() => {
    document.getElementById('ttsNote').textContent = '⚠ Autoplay blocked — tap Play again';
    isSpeaking = false;
    document.getElementById('playBtn').textContent = '▶';
  });
}

function fallbackBrowserTTS(text) {
  const synth = window.speechSynthesis;
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const codes = { english:'en-US', french:'fr-FR', russian:'ru-RU' };
  utter.lang = codes[lang];
  utter.rate = 0.85;
  const voices = synth.getVoices();
  const prefix = codes[lang].split('-')[0];
  const v = voices.find(v=>v.lang===codes[lang]) || voices.find(v=>v.lang.startsWith(prefix));
  if (v) utter.voice = v;
  synth.speak(utter);
  isSpeaking = true;
  document.getElementById('playBtn').textContent = '⏸';
  const estSecs = (text.split(/\s+/).length/130)*60;
  document.getElementById('tDur').textContent = fmt(estSecs);
  const start = Date.now();
  progressTimer = setInterval(()=>{
    const e=(Date.now()-start)/1000;
    document.getElementById('tElapsed').textContent=fmt(e);
    document.getElementById('fill').style.width=Math.min((e/estSecs)*100,100)+'%';
  },500);
  utter.onend = () => { clearInterval(progressTimer); isSpeaking=false; document.getElementById('playBtn').textContent='▶'; };
}

document.getElementById('playBtn').addEventListener('click', () => {
  if (!fullText) return;
  if (isSpeaking) { stopAudio(); window.speechSynthesis?.cancel(); }
  else { document.getElementById('ttsNote').textContent=''; playAudio(fullText); }
});

// ── Generate ──
document.getElementById('genBtn').addEventListener('click', async () => {
  stopAudio(); window.speechSynthesis?.cancel();

  // Try to get API key from localStorage (set by dashboard settings)
  if (!apiKey) apiKey = localStorage.getItem('philou_anthropic_key') || '';
  if (!apiKey) {
    document.getElementById('errMsg').textContent = 'No Anthropic API key — add it in Settings.';
    document.getElementById('storyOut').classList.add('visible');
    return;
  }

  document.getElementById('errMsg').textContent = '';
  document.getElementById('ttsNote').textContent = '';
  document.getElementById('storyOut').classList.add('visible');
  document.getElementById('outTitle').textContent = '';
  document.getElementById('outBody').textContent = '';
  document.getElementById('audioBar').style.display = 'none';
  document.getElementById('genBtn').disabled = true;
  fullText = '';

  const age = parseInt(document.getElementById('ageInput').value) || 5;
  const active = tags.filter(t=>t.active).map(t=>t.text);
  const themeStr = active.length ? `Themes/elements to include: ${active.join(', ')}.` : '';
  const langMap = {
    english: 'Write the story entirely in English.',
    french: 'Écris l\'histoire entièrement en français.',
    russian: 'Напиши историю полностью на русском языке.',
  };
  const prompt = `You are a warm, gentle bedtime story narrator. Write a complete bedtime story for a ${age}-year-old child. The story should:
- Be approximately 500-600 words (about 5 minutes when read aloud slowly)
- Have a simple, calming narrative arc with a clear positive message
- Be engaging and imaginative but NOT exciting or stimulating — help the child relax and drift to sleep
- End on a peaceful, sleepy, comforting note
- Use age-appropriate vocabulary for a ${age}-year-old
- ${themeStr}
- ${langMap[lang]}

Start with a title on the first line (just the title, no "Title:" prefix), then a blank line, then the story. Plain text only, no markdown.`;

  let buf = '', titleDone = false, titleText = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor'; cursor.textContent = '▌';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000, stream: true,
        messages: [{ role:'user', content: prompt }]
      })
    });

    if (!res.ok) throw new Error('API error ' + res.status);

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    const bodyEl = document.getElementById('outBody');
    bodyEl.appendChild(cursor);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6); if (d==='[DONE]') continue;
        try {
          const p = JSON.parse(d);
          if (p.type==='content_block_delta' && p.delta?.text) {
            buf += p.delta.text;
            if (!titleDone && buf.includes('\n')) {
              const nl = buf.indexOf('\n');
              titleText = buf.slice(0,nl).trim();
              buf = buf.slice(nl).replace(/^\n+/,'');
              titleDone = true;
              document.getElementById('outTitle').textContent = titleText;
            }
            if (titleDone) {
              bodyEl.textContent = buf;
              bodyEl.appendChild(cursor);
            }
          }
        } catch(e){}
      }
    }

    cursor.remove();
    fullText = titleText + '.\n\n' + buf;
    document.getElementById('audioBar').style.display = 'flex';

  } catch(err) {
    cursor.remove();
    document.getElementById('errMsg').textContent = 'Error: ' + err.message;
  }

  document.getElementById('genBtn').disabled = false;
});

renderTags();
</script>
</body>
</html>
