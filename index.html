<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Bedtime Stories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #0d1b3e;
    color: #e8dfc8;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
    position: relative;
    overflow-x: hidden;
  }
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 20% 10%, rgba(255,240,180,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 15%, rgba(255,240,180,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 5%, rgba(255,240,180,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 25%, rgba(255,240,180,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 30%, rgba(255,240,180,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,240,180,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 8%, rgba(255,240,180,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 20%, rgba(255,240,180,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 45%, rgba(255,240,180,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 50%, rgba(255,240,180,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 60%, rgba(255,240,180,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 70%, rgba(255,240,180,0.3) 0%, transparent 100%);
  }
  .moon {
    position: fixed; top: 30px; right: 60px;
    width: 70px; height: 70px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff9d6, #f5c842);
    box-shadow: 0 0 30px 10px rgba(245,200,66,0.2), 0 0 60px 20px rgba(245,200,66,0.1);
    z-index: 0;
    animation: moonGlow 4s ease-in-out infinite;
  }
  @keyframes moonGlow {
    0%, 100% { box-shadow: 0 0 30px 10px rgba(245,200,66,0.2), 0 0 60px 20px rgba(245,200,66,0.1); }
    50% { box-shadow: 0 0 40px 15px rgba(245,200,66,0.3), 0 0 80px 30px rgba(245,200,66,0.15); }
  }
  .wrapper { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
  .title-section { text-align: center; margin-bottom: 2rem; }
  .title-section h1 {
    font-family: 'Lora', serif; font-size: 2.2rem; font-weight: 600;
    color: #f5d76e; text-shadow: 0 0 20px rgba(245,215,110,0.4); margin-bottom: 0.3rem;
  }
  .title-section p { font-size: 0.95rem; color: #8fa8c8; letter-spacing: 0.05em; }
  .panel {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 1.5rem; margin-bottom: 1.2rem;
  }
  .panel-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #7a9abf; margin-bottom: 0.8rem; }
  .lang-buttons { display: flex; gap: 0.7rem; }
  .lang-btn {
    flex: 1; padding: 0.7rem;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px; color: #c8d8e8; font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .lang-btn:hover { background: rgba(245,215,110,0.12); border-color: rgba(245,215,110,0.3); color: #f5d76e; }
  .lang-btn.active { background: rgba(245,215,110,0.18); border-color: #f5d76e; color: #f5d76e; }
  .inputs-row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .input-group { flex: 1; min-width: 120px; }
  .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #7a9abf; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
  .input-group input[type="number"] {
    width: 100%; padding: 0.65rem 1rem;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #e8dfc8; font-family: 'Nunito', sans-serif;
    font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  .input-group input[type="number"]:focus { border-color: rgba(245,215,110,0.5); }
  .tag-input-row { display: flex; gap: 0.6rem; margin-bottom: 0.8rem; }
  .tag-input-row input[type="text"] {
    flex: 1; padding: 0.65rem 1rem;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #e8dfc8; font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; outline: none; transition: border-color 0.2s;
  }
  .tag-input-row input[type="text"]::placeholder { color: #4a6080; }
  .tag-input-row input[type="text"]:focus { border-color: rgba(245,215,110,0.5); }
  .add-tag-btn {
    padding: 0.65rem 1rem; background: rgba(245,215,110,0.15);
    border: 1.5px solid rgba(245,215,110,0.3); border-radius: 10px;
    color: #f5d76e; font-size: 1.1rem; cursor: pointer; transition: all 0.2s;
  }
  .add-tag-btn:hover { background: rgba(245,215,110,0.25); }
  .tags-container { display: flex; flex-wrap: wrap; gap: 0.5rem; min-height: 36px; }
  .tag {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px 4px 12px; border-radius: 20px;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; user-select: none; border: 1.5px solid;
  }
  .tag.inactive { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); color: #6a82a0; }
  .tag.active { background: rgba(100,180,255,0.15); border-color: rgba(100,180,255,0.4); color: #90c8f0; }
  .tag .remove-tag { font-size: 0.75rem; opacity: 0.5; display: flex; align-items: center; transition: opacity 0.15s; }
  .tag:hover .remove-tag { opacity: 1; }
  .generate-btn {
    width: 100%; padding: 1rem;
    background: linear-gradient(135deg, #f5d76e, #e8a84a);
    border: none; border-radius: 14px; color: #1a1000;
    font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(245,215,110,0.3); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .api-key-section { margin-bottom: 1.2rem; }
  .api-key-input {
    width: 100%; padding: 0.65rem 1rem;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,100,100,0.3);
    border-radius: 10px; color: #e8dfc8; font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  .api-key-input:focus { border-color: rgba(245,215,110,0.5); }
  .api-key-input::placeholder { color: #4a6080; }
  .api-key-hint { font-size: 0.75rem; color: #6a82a0; margin-top: 0.4rem; }
  .api-key-hint a { color: #7aa8d0; }
  .story-panel {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 1.5rem; margin-top: 1.2rem; display: none;
  }
  .story-panel.visible { display: block; }
  .story-title { font-family: 'Lora', serif; font-size: 1.4rem; font-weight: 600; color: #f5d76e; margin-bottom: 1rem; text-align: center; }
  .story-text { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.9; color: #d8ccb8; white-space: pre-wrap; }
  .story-text.streaming::after { content: '▌'; animation: blink 0.7s step-end infinite; color: #f5d76e; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .audio-controls {
    display: flex; align-items: center; gap: 1rem; margin-top: 1.5rem;
    padding-top: 1.2rem; border-top: 1px solid rgba(255,255,255,0.08);
  }
  .play-btn {
    width: 50px; height: 50px; border-radius: 50%;
    background: rgba(245,215,110,0.15); border: 1.5px solid rgba(245,215,110,0.4);
    color: #f5d76e; font-size: 1.3rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .play-btn:hover { background: rgba(245,215,110,0.25); }
  .play-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .progress-wrap { flex: 1; }
  .progress-bar-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; background: #f5d76e; border-radius: 2px; width: 0%; transition: width 0.3s linear; pointer-events: none; }
  .time-label { font-size: 0.78rem; color: #6a82a0; display: flex; justify-content: space-between; }
  .error-msg { color: #f08080; font-size: 0.9rem; text-align: center; padding: 0.5rem; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { opacity: 1; }
  @media (max-width: 480px) {
    .title-section h1 { font-size: 1.7rem; }
    .lang-btn { font-size: 0.82rem; padding: 0.6rem 0.3rem; }
    .moon { width: 50px; height: 50px; right: 20px; top: 20px; }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="moon"></div>

<div class="wrapper">
  <div class="title-section">
    <h1>✨ Bedtime Stories</h1>
    <p>A magical story, just for your little one</p>
  </div>

  <div class="panel api-key-section">
    <div class="panel-label">🔑 Anthropic API Key</div>
    <input type="password" class="api-key-input" id="apiKeyInput" placeholder="sk-ant-..." />
    <p class="api-key-hint">Get your key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> — stored only in your browser session.</p>
  </div>

  <div class="panel">
    <div class="panel-label">🌍 Language</div>
    <div class="lang-buttons">
      <button class="lang-btn active" data-lang="english">🇬🇧 English</button>
      <button class="lang-btn" data-lang="french">🇫🇷 Français</button>
      <button class="lang-btn" data-lang="russian">🇷🇺 Русский</button>
    </div>
  </div>

  <div class="panel">
    <div class="inputs-row">
      <div class="input-group">
        <label>🎂 Child's age</label>
        <input type="number" id="ageInput" min="1" max="12" value="5" />
      </div>
      <div class="input-group" style="flex: 2;">
        <label>🏷️ Story themes</label>
        <div class="tag-input-row">
          <input type="text" id="tagInput" placeholder="pirate, dragon, astronaut..." />
          <button class="add-tag-btn" id="addTagBtn">＋</button>
        </div>
      </div>
    </div>
    <div class="tags-container" id="tagsContainer"></div>
  </div>

  <button class="generate-btn" id="generateBtn">🌙 Generate bedtime story</button>

  <div class="story-panel" id="storyPanel">
    <div class="story-title" id="storyTitle"></div>
    <div class="story-text" id="storyText"></div>
    <div class="audio-controls" id="audioControls" style="display:none;">
      <button class="play-btn" id="playBtn">▶</button>
      <div class="progress-wrap">
        <div class="progress-bar-track" id="progressTrack">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="time-label">
          <span id="timeElapsed">0:00</span>
          <span id="timeDuration">--:--</span>
        </div>
      </div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<script>
  let selectedLang = 'english';
  let tags = [
    { text: 'pirate', active: true },
    { text: 'treasure', active: true },
    { text: 'dragon', active: false }
  ];
  let fullStoryText = '';
  let isSpeaking = false;
  let speechSynth = window.speechSynthesis;
  let progressInterval = null;

  const langBtns = document.querySelectorAll('.lang-btn');
  const tagInput = document.getElementById('tagInput');
  const addTagBtn = document.getElementById('addTagBtn');
  const tagsContainer = document.getElementById('tagsContainer');
  const generateBtn = document.getElementById('generateBtn');
  const storyPanel = document.getElementById('storyPanel');
  const storyTitle = document.getElementById('storyTitle');
  const storyText = document.getElementById('storyText');
  const audioControls = document.getElementById('audioControls');
  const playBtn = document.getElementById('playBtn');
  const progressFill = document.getElementById('progressFill');
  const timeElapsed = document.getElementById('timeElapsed');
  const timeDuration = document.getElementById('timeDuration');
  const errorMsg = document.getElementById('errorMsg');
  const apiKeyInput = document.getElementById('apiKeyInput');

  langBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      langBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedLang = btn.dataset.lang;
    });
  });

  function renderTags() {
    tagsContainer.innerHTML = '';
    tags.forEach((tag, i) => {
      const el = document.createElement('div');
      el.className = 'tag ' + (tag.active ? 'active' : 'inactive');
      el.innerHTML = `<span>${tag.text}</span><span class="remove-tag" title="Remove">✕</span>`;
      el.querySelector('span:first-child').addEventListener('click', () => { tags[i].active = !tags[i].active; renderTags(); });
      el.querySelector('.remove-tag').addEventListener('click', (e) => { e.stopPropagation(); tags.splice(i, 1); renderTags(); });
      tagsContainer.appendChild(el);
    });
  }

  function addTag() {
    const val = tagInput.value.trim().toLowerCase();
    if (!val) return;
    if (!tags.find(t => t.text === val)) { tags.push({ text: val, active: true }); renderTags(); }
    tagInput.value = '';
    tagInput.focus();
  }

  addTagBtn.addEventListener('click', addTag);
  tagInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTag(); });

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function stopSpeech() {
    if (speechSynth) speechSynth.cancel();
    clearInterval(progressInterval);
    isSpeaking = false;
    playBtn.textContent = '▶';
    progressFill.style.width = '0%';
    timeElapsed.textContent = '0:00';
  }

  playBtn.addEventListener('click', () => {
    if (!fullStoryText) return;
    if (isSpeaking) { speechSynth.cancel(); clearInterval(progressInterval); isSpeaking = false; playBtn.textContent = '▶'; return; }
    startSpeech();
  });

  function getLangCode() {
    if (selectedLang === 'french') return 'fr-FR';
    if (selectedLang === 'russian') return 'ru-RU';
    return 'en-US';
  }

  function getBestVoice(lang) {
    const voices = speechSynth.getVoices();
    const prefix = lang.split('-')[0];
    return voices.find(v => v.lang === lang && !v.name.includes('compact'))
      || voices.find(v => v.lang.startsWith(prefix) && !v.name.includes('compact'))
      || voices.find(v => v.lang.startsWith(prefix))
      || null;
  }

  function startSpeech() {
    const langCode = getLangCode();
    const text = fullStoryText;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = langCode; utter.rate = 0.85; utter.pitch = 1.05;

    const trySpeak = () => {
      const voice = getBestVoice(langCode);
      if (voice) utter.voice = voice;
      const estimatedSecs = (text.split(/\s+/).length / 130) * 60;
      timeDuration.textContent = formatTime(estimatedSecs);
      let startTime = Date.now();
      progressInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) / 1000;
        progressFill.style.width = Math.min((elapsed / estimatedSecs) * 100, 100) + '%';
        timeElapsed.textContent = formatTime(elapsed);
      }, 500);
      utter.onend = () => { clearInterval(progressInterval); isSpeaking = false; playBtn.textContent = '▶'; progressFill.style.width = '100%'; };
      utter.onerror = () => { clearInterval(progressInterval); isSpeaking = false; playBtn.textContent = '▶'; };
      speechSynth.speak(utter);
      isSpeaking = true;
      playBtn.textContent = '⏸';
    };

    if (speechSynth.getVoices().length === 0) { speechSynth.onvoiceschanged = trySpeak; } else { trySpeak(); }
  }

  generateBtn.addEventListener('click', async () => {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { errorMsg.textContent = 'Please enter your Anthropic API key above.'; storyPanel.classList.add('visible'); return; }
    stopSpeech();
    const age = parseInt(document.getElementById('ageInput').value) || 5;
    const activeTags = tags.filter(t => t.active).map(t => t.text);
    errorMsg.textContent = '';
    storyPanel.classList.add('visible');
    audioControls.style.display = 'none';
    storyTitle.textContent = '';
    storyText.textContent = '';
    storyText.className = 'story-text streaming';
    generateBtn.disabled = true;

    const langInstructions = {
      english: 'Write the story entirely in English.',
      french: 'Écris l\'histoire entièrement en français.',
      russian: 'Напиши историю полностью на русском языке.'
    };
    const themeStr = activeTags.length > 0 ? `Themes/elements to include: ${activeTags.join(', ')}.` : '';
    const prompt = `You are a warm, gentle bedtime story narrator. Write a complete bedtime story for a ${age}-year-old child. The story should:
- Be approximately 500-600 words (about 5 minutes when read aloud slowly)
- Have a simple, calming narrative arc with a clear positive message
- Be engaging and imaginative but NOT exciting or stimulating — it should help a child relax and drift to sleep
- End on a peaceful, sleepy, comforting note
- Use age-appropriate vocabulary for a ${age}-year-old
- ${themeStr}
- ${langInstructions[selectedLang]}

Start with a title on the first line (just the title, no "Title:" prefix), then a blank line, then the story. Do not use markdown formatting — just plain text paragraphs.`;

    let buffer = '';
    fullStoryText = '';
    let titleExtracted = false;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, stream: true, messages: [{ role: 'user', content: prompt }] })
      });

      if (!response.ok) { throw new Error(`API error ${response.status}`); }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        for (const line of chunk.split('\n')) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
                buffer += parsed.delta.text;
                if (!titleExtracted && buffer.includes('\n')) {
                  const nl = buffer.indexOf('\n');
                  storyTitle.textContent = buffer.slice(0, nl).trim();
                  buffer = buffer.slice(nl).replace(/^\n+/, '');
                  titleExtracted = true;
                }
                if (titleExtracted) { storyText.textContent = buffer; fullStoryText = storyTitle.textContent + '\n\n' + buffer; }
              }
            } catch(e) {}
          }
        }
      }
      storyText.className = 'story-text';
      fullStoryText = storyTitle.textContent + '\n\n' + buffer;
      audioControls.style.display = 'flex';
    } catch (err) {
      storyText.className = 'story-text';
      errorMsg.textContent = 'Something went wrong: ' + err.message + '. Please check your API key and try again.';
    }
    generateBtn.disabled = false;
  });

  renderTags();
</script>
</body>
</html>
